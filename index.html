<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu mã shop Shopee</title>
    <style>
        :root {
            --accent: #5c8b9f; 
            --bg-cream: #f8f5e6; 
            --text-dark: #4a3f35;
            --text-light: #7a6f65; 
            --notice-bg: #fffbf0; 
            --white: #ffffff;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-cream); 
            color: var(--text-dark); 
            margin: 0; 
            padding: 40px 15px; 
            padding-bottom: 100px; 
        }

        .container { 
            background: var(--white); 
            border-radius: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 480px; 
            margin: auto; 
            overflow: hidden; 
            border: 2px solid #e8e4d5; 
        }

        .banner { width: 100%; height: 120px; background: var(--accent); position: relative; }
        
        .banner::after {
            content: '✨';
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 24px;
            opacity: 0.5;
        }

        .logo-wrapper { 
            width: 80px; height: 80px; 
            background: white; 
            border-radius: 50%; 
            margin: -40px auto 15px auto; 
            padding: 5px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); 
            border: 2px solid var(--bg-cream); 
            position: relative;
            z-index: 2;
        }
        .logo-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .content { padding: 0 20px 30px 20px; }
        h2 { text-align: center; margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .subtitle { text-align: center; color: var(--text-light); font-size: 13px; margin: 8px 0 20px 0; }

        .promo-status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .promo-card {
            background: var(--notice-bg);
            border: 2px solid #e8e4d5;
            border-radius: 18px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .promo-label {
            display: block;
            font-size: 10px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .promo-value {
            display: block;
            font-size: 15px;
            font-weight: 900;
            color: var(--text-dark);
        }

        .search-box {
            position: relative;
            margin-bottom: 10px;
        }

        .input-label {
            font-size: 11px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
            margin-left: 5px;
        }
        
        input#brandSearch, select#discountFilter {
            width: 100%;
            padding: 16px 20px;
            border-radius: 15px;
            border: 2px solid #e8e4d5;
            background: var(--bg-cream);
            font-size: 15px;
            font-family: inherit;
            box-sizing: border-box;
            transition: var(--transition);
        }

        input#brandSearch:focus, select#discountFilter:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(92, 139, 159, 0.1);
        }

        select#discountFilter {
            margin-top: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            color: var(--text-dark);
            font-weight: 600;
        }

        .view-all-btn {
            width: 100%;
            background: transparent;
            border: 2px dashed #e8e4d5;
            color: var(--text-light);
            padding: 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
            transition: var(--transition);
        }

        .view-all-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(92, 139, 159, 0.05);
        }

        #resultsArea {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 50px;
        }

        .voucher-card {
            background: var(--white);
            border: 2px solid #e8e4d5;
            border-radius: 18px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-info { flex: 1; }
        .brand-name { font-weight: 800; font-size: 15px; display: block; color: var(--text-dark); }
        .voucher-code { 
            font-family: 'Monaco', monospace; 
            color: var(--accent); 
            font-weight: 700; 
            font-size: 14px;
            background: #f0f4f5;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 4px;
        }
        .discount-badge {
            font-size: 11px;
            background: #ffebe6;
            color: #ff4d4f;
            padding: 1px 6px;
            border-radius: 4px;
            font-weight: 800;
            margin-left: 6px;
        }

        .copy-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
        }

        .copy-btn:active { transform: scale(0.95); }
        .copy-btn.copied { background: #28a745; }

        .no-results {
            text-align: center;
            color: var(--text-light);
            font-size: 13px;
            padding: 20px;
            font-style: italic;
        }

        .notice-board { 
            background: var(--notice-bg); 
            border: 2px solid #e8e4d5; 
            border-radius: 20px; 
            padding: 20px; 
            margin-top: 25px; 
            text-align: center;
        }

        .btn-shopee-app {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 25px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 13px;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(92, 139, 159, 0.2);
        }

        .btn-shopee-app:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        #socialProof {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(150%);
            background: white; padding: 12px 20px; border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 10px;
            z-index: 9999; border: 2px solid var(--accent); transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            min-width: 250px; font-size: 12px; font-weight: 600;
        }
        #socialProof.show { transform: translateX(-50%) translateY(0); }
        .proof-dot { width: 8px; height: 8px; background: #28a745; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

    </style>
</head>

    let isShowingAll = false;

    function searchVoucher() {
        const query = document.getElementById('brandSearch').value.toLowerCase().trim();
        const discountType = document.getElementById('discountFilter').value;
        const resultsArea = document.getElementById('resultsArea');
        const toggleBtn = document.getElementById('toggleBtn');
        resultsArea.innerHTML = "";
        
        isShowingAll = false; 
        toggleBtn.innerText = "✨ Xem tất cả voucher hiện có";

        // Condition altered: If query is empty but a specific discount filter is selected, we still process and display cards matching that specific category.
        if (query === "" && discountType === "all") {
            resultsArea.innerHTML = '<div class="no-results">Nhập tên thương hiệu hoặc chọn mức giảm để xem mã...</div>';
            return;
        }

        const filtered = voucherData.filter(item => {
            const matchesQuery = item.brand.toLowerCase().includes(query) || item.code.toLowerCase().includes(query);
            const matchesDiscount = discountType === "all" || item.discount.toString() === discountType;
            return matchesQuery && matchesDiscount;
        });

        renderResults(filtered);
    }

    function showAllVouchers() {
        const toggleBtn = document.getElementById('toggleBtn');
        const searchInput = document.getElementById('brandSearch');
        const discountFilter = document.getElementById('discountFilter');

        if (isShowingAll) {
            searchInput.value = "";
            discountFilter.value = "all";
            searchVoucher(); 
            toggleBtn.innerText = "✨ Xem tất cả voucher hiện có";
            isShowingAll = false;
        } else {
            searchInput.value = ""; 
            discountFilter.value = "all";
            renderResults(voucherData);
            toggleBtn.innerText = "🔼 Thu gọn danh sách";
            isShowingAll = true;
        }
    }

    function renderResults(data) {
        const resultsArea = document.getElementById('resultsArea');
        resultsArea.innerHTML = "";
        
        if (data.length > 0) {
            data.forEach(item => {
                resultsArea.innerHTML += `
                    <div class="voucher-card">
                        <div class="brand-info">
                            <span class="brand-name">${item.brand}<span class="discount-badge">-${item.discount}%</span></span>
                            <span class="voucher-code">${item.code}</span>
                        </div>
                        <button class="copy-btn" onclick="copyCode('${item.code}', this)">COPY</button>
                    </div>
                `;
            });
        } else {
            resultsArea.innerHTML = '<div class="no-results">Không tìm thấy mã phù hợp tiêu chí 🧊</div>';
        }
    }

    function copyCode(code, btn) {
        navigator.clipboard.writeText(code).then(() => {
            const originalText = btn.innerText;
            btn.innerText = "XONG! ✅";
            btn.classList.add('copied');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('copied');
            }, 1500);
        });
    }

    const tickerMessages = [
        "Một bạn vừa copy mã d’Alba thành công!",
        "Voucher Torriden đang được dùng nhiều ✨",
        "Mã CLIO vừa được tìm thấy.",

    ];

    function startSocialProof() {
        const proofEl = document.getElementById('socialProof');
        const textEl = document.getElementById('proofText');
        
        setInterval(() => {
            let msg = tickerMessages[Math.floor(Math.random() * tickerMessages.length)];
            textEl.innerText = msg; 
            proofEl.classList.add('show');
            setTimeout(() => { proofEl.classList.remove('show'); }, 4000);
        }, 12000);
    }

    window.onload = () => {
        searchVoucher();
        startSocialProof();
    };
