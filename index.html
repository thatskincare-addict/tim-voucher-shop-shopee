<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu mã shop Shopee</title>
    <style>
        :root {
            --accent: #5c8b9f; 
            --bg-cream: #f8f5e6; 
            --text-dark: #4a3f35;
            --text-light: #7a6f65; 
            --notice-bg: #fffbf0; 
            --white: #ffffff;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-cream); 
            color: var(--text-dark); 
            margin: 0; 
            padding: 40px 15px; 
            padding-bottom: 100px; 
        }

        .container { 
            background: var(--white); 
            border-radius: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 480px; 
            margin: auto; 
            overflow: hidden; 
            border: 2px solid #e8e4d5; 
        }

        .banner { width: 100%; height: 120px; background: var(--accent); position: relative; }
        
        .banner::after {
            content: '✨';
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 24px;
            opacity: 0.5;
        }

        .logo-wrapper { 
            width: 80px; height: 80px; 
            background: white; 
            border-radius: 50%; 
            margin: -40px auto 15px auto; 
            padding: 5px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); 
            border: 2px solid var(--bg-cream); 
            position: relative;
            z-index: 2;
        }
        .logo-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .content { padding: 0 20px 30px 20px; }
        h2 { text-align: center; margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .subtitle { text-align: center; color: var(--text-light); font-size: 13px; margin: 8px 0 20px 0; }

        .promo-status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .promo-card {
            background: var(--notice-bg);
            border: 2px solid #e8e4d5;
            border-radius: 18px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .promo-label {
            display: block;
            font-size: 10px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .promo-value {
            display: block;
            font-size: 15px;
            font-weight: 900;
            color: var(--text-dark);
        }

        .search-box {
            position: relative;
            margin-bottom: 10px;
        }

        .input-label {
            font-size: 11px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
            margin-left: 5px;
        }
        
        input#brandSearch {
            width: 100%;
            padding: 16px 20px;
            border-radius: 15px;
            border: 2px solid #e8e4d5;
            background: var(--bg-cream);
            font-size: 15px;
            font-family: inherit;
            box-sizing: border-box;
            transition: var(--transition);
        }

        input#brandSearch:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(92, 139, 159, 0.1);
        }

        .view-all-btn {
            width: 100%;
            background: transparent;
            border: 2px dashed #e8e4d5;
            color: var(--text-light);
            padding: 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
            transition: var(--transition);
        }

        .view-all-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(92, 139, 159, 0.05);
        }

        #resultsArea {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 50px;
        }

        .voucher-card {
            background: var(--white);
            border: 2px solid #e8e4d5;
            border-radius: 18px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-info { flex: 1; }
        .brand-name { font-weight: 800; font-size: 15px; display: block; color: var(--text-dark); }
        .voucher-code { 
            font-family: 'Monaco', monospace; 
            color: var(--accent); 
            font-weight: 700; 
            font-size: 14px;
            background: #f0f4f5;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 4px;
        }

        .copy-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
        }

        .copy-btn:active { transform: scale(0.95); }
        .copy-btn.copied { background: #28a745; }

        .no-results {
            text-align: center;
            color: var(--text-light);
            font-size: 13px;
            padding: 20px;
            font-style: italic;
        }

        .notice-board { 
            background: var(--notice-bg); 
            border: 2px solid #e8e4d5; 
            border-radius: 20px; 
            padding: 20px; 
            margin-top: 25px; 
            text-align: center;
        }

        .btn-shopee-app {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 25px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 13px;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(92, 139, 159, 0.2);
        }

        .btn-shopee-app:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        #socialProof {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(150%);
            background: white; padding: 12px 20px; border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 10px;
            z-index: 9999; border: 2px solid var(--accent); transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            min-width: 250px; font-size: 12px; font-weight: 600;
        }
        #socialProof.show { transform: translateX(-50%) translateY(0); }
        .proof-dot { width: 8px; height: 8px; background: #28a745; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

    </style>
</head>
<body>

<div id="socialProof">
    <div class="proof-dot"></div>
    <span id="proofText">Đang cập nhật mã mới...</span>
</div>

<div class="container">
    <div class="banner"></div>
    <div class="logo-wrapper">
        <img src="https://i.pinimg.com/736x/06/3c/fa/063cfa3125f4cb7a29fda76242998113.jpg" alt="Shopee Hub">
    </div>

    <div class="content">
        <h2>🔍 Tìm voucher shop</h2>
        <p class="subtitle">SALE NGÀY ĐÔI 5.5</p>

        <div class="promo-status-grid">
            <div class="promo-card">
                <span class="promo-label">🏷️ Mức giảm</span>
                <span class="promo-value">Giảm 18%</span>
            </div>
            <div class="promo-card">
                <span class="promo-label">📅 Áp dụng</span>
                <span class="promo-value">Từ 0H 5.5</span>
            </div>
        </div>

        <div class="search-box">
            <span class="input-label">🚀 Nhập tên Shop/Brand</span>
            <input type="text" id="brandSearch" placeholder="Ví dụ: Torriden, Clio, Fwee..." oninput="searchVoucher()">
        </div>

        <button id="toggleBtn" class="view-all-btn" onclick="showAllVouchers()">✨ Xem tất cả voucher hiện có</button>

        <div id="resultsArea"></div>

        <div class="notice-board">
            <div style="font-weight:800; font-size:13px; color: var(--accent);">💡 HƯỚNG DẪN</div>
            <div style="font-size:12px; line-height:1.5; color:var(--text-light); margin-top: 5px;">
                Copy mã và dán vào mục "Shopee Voucher" trong giỏ hàng để áp dụng giảm giá cho shop tương ứng<br><br>
                Hoặc lưu trước mã vào ví 👇🏻
            </div>
            <a href="https://s.shopee.vn/5KuATmWll5" target="_blank" class="btn-shopee-app">Mở ví voucher 🎟️</a>
        </div>
    </div>
</div>

<script>
    const voucherData = [
        { code: "CBFSP31", brand: "APLB" },
  { code: "CBFSP30", brand: "One day’s you" },
  { code: "CBFSP1", brand: "d’Alba" },
  { code: "CBFSP2", brand: "Torriden" },
  { code: "CBFSP3", brand: "CLIO/Peripera" },
  { code: "CBFSP5", brand: "Beplain" },
  { code: "CBFSP7", brand: "fwee" },
  { code: "CBFSP8", brand: "Tirtir" },
  { code: "CBFSP13", brand: "numbuzin" },
  { code: "CBFSP14", brand: "TFIT" },
  { code: "CBFSP15", brand: "Some by mi" },
  { code: "CBFSP16", brand: "VT cosmetics" },
  { code: "CBFSP29", brand: "by Wishtrend" },
  { code: "CBFSP32", brand: "Ooznary" },
  { code: "CBFSP35", brand: "Papa recipe" },
  { code: "CBFSP36", brand: "Inga" },
  { code: "CBFSP37", brand: "Tonymoly" },
  { code: "CBFSP54", brand: "Etude" },
  { code: "CBFSP55", brand: "Eqqualberry" },
  { code: "CBFSP65", brand: "Age 20’S" },
  { code: "CBFSP71", brand: "Dermafirm" },
  { code: "CBFSP76", brand: "Rejuran" },
  { code: "CBFSP84", brand: "ilso" },
  { code: "CBFSP85", brand: "KPOP MERCH" },
  { code: "CBFSP91", brand: "OBgE" },
  { code: "CBFSP93", brand: "mixsoon" },
  { code: "CBFSP95", brand: "Arencia" },
  { code: "CBFSP96", brand: "odiD" },
  { code: "CBFSP98", brand: "Fully" },
  { code: "CBFSP104", brand: "Snow2plus" },
  { code: "CBFSP109", brand: "VDL" },
  { code: "CBFSP111", brand: "hanskin" },
  { code: "CBFSP113", brand: "Parnell" },
  { code: "CBFSP114", brand: "Dewytree" },
  { code: "CBFSP122", brand: "Laka" },
  { code: "CBFSP124", brand: "Cosnori" },
  { code: "CBFSP125", brand: "Dearglam" },
  { code: "CBFSP69", brand: "Koko.kr" },
  { code: "CBFSP70", brand: "Glory of Seoul" },
  { code: "CBFSP73", brand: "Stylemite" },
  { code: "CBFSP74", brand: "ibbeauty" },
  { code: "CBFSP75", brand: "yaocos" },
  { code: "CBFSP97", brand: "Market Heidi" },
  { code: "CBFSP107", brand: "koksara" }
    ];

    let isShowingAll = false;

    function searchVoucher() {
        const query = document.getElementById('brandSearch').value.toLowerCase().trim();
        const resultsArea = document.getElementById('resultsArea');
        const toggleBtn = document.getElementById('toggleBtn');
        resultsArea.innerHTML = "";
        
        isShowingAll = false; // Reset state when user starts typing
        toggleBtn.innerText = "✨ Xem tất cả voucher hiện có";

        if (query === "") {
            resultsArea.innerHTML = '<div class="no-results">Nhập tên thương hiệu để xem mã...</div>';
            return;
        }

        const filtered = voucherData.filter(item => 
            item.brand.toLowerCase().includes(query) || 
            item.code.toLowerCase().includes(query)
        );

        renderResults(filtered);
    }

    function showAllVouchers() {
        const toggleBtn = document.getElementById('toggleBtn');
        const searchInput = document.getElementById('brandSearch');

        if (isShowingAll) {
            // COLLAPSE LOGIC
            searchInput.value = "";
            searchVoucher(); // This resets the view to default
            toggleBtn.innerText = "✨ Xem tất cả voucher hiện có";
            isShowingAll = false;
        } else {
            // EXPAND LOGIC
            searchInput.value = ""; 
            renderResults(voucherData);
            toggleBtn.innerText = "🔼 Thu gọn danh sách";
            isShowingAll = true;
        }
    }

    function renderResults(data) {
        const resultsArea = document.getElementById('resultsArea');
        resultsArea.innerHTML = "";
        
        if (data.length > 0) {
            data.forEach(item => {
                resultsArea.innerHTML += `
                    <div class="voucher-card">
                        <div class="brand-info">
                            <span class="brand-name">${item.brand}</span>
                            <span class="voucher-code">${item.code}</span>
                        </div>
                        <button class="copy-btn" onclick="copyCode('${item.code}', this)">COPY</button>
                    </div>
                `;
            });
        } else {
            resultsArea.innerHTML = '<div class="no-results">Không tìm thấy mã cho thương hiệu này 🧊</div>';
        }
    }

    function copyCode(code, btn) {
        navigator.clipboard.writeText(code).then(() => {
            const originalText = btn.innerText;
            btn.innerText = "XONG! ✅";
            btn.classList.add('copied');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('copied');
            }, 1500);
        });
    }

    const tickerMessages = [
        "Một bạn vừa copy mã d’Alba thành công!",
        "Voucher Torriden đang được dùng nhiều ✨",
        "Mã CLIO vừa được tìm thấy.",
        "Brand fwee đang có ưu đãi lớn!",
        "Hệ thống vừa cập nhật 16 mã mới nhất."
    ];

    function startSocialProof() {
        const proofEl = document.getElementById('socialProof');
        const textEl = document.getElementById('proofText');
        
        setInterval(() => {
            let msg = tickerMessages[Math.floor(Math.random() * tickerMessages.length)];
            textEl.innerText = msg; 
            proofEl.classList.add('show');
            setTimeout(() => { proofEl.classList.remove('show'); }, 4000);
        }, 12000);
    }

    window.onload = () => {
        searchVoucher();
        startSocialProof();
    };
</script>

</body>
</html>
